<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="Web application">
    <link rel="stylesheet" href="leaflet.css">
    <link rel="stylesheet" href="L.Control.Locate.min.css">
    <link rel="stylesheet" href="leaflet-search.css">
    <style>
      #map,
      body,
      html {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0
      }

      .info {
        padding: 6px 8px;
        font: 14px/16px Arial, Helvetica, sans-serif;
        background: #fff;
        background: rgba(255, 255, 255, .8);
        box-shadow: 0 0 15px rgba(0, 0, 0, .2);
        border-radius: 5px
      }

      .info h4 {
        margin: 0 0 5px;
        color: #777
      }
    </style>
    <title>Map</title>
  </head>
  <body>
    <div id="map"></div>
    <script src="leaflet.js"></script>
    <script src="L.Control.Locate.min.js"></script>
    <script src="leaflet-search.js"></script>
    <script src="dsklsec.js"></script>
    <script src="point.js"></script>
   <script>
var map = L.map('map', {zoomSnap: 0, zoomDelta: 0.25}).setView([12.9912, 77.5999], 11);
var scale = L.control.scale();
         scale.addTo(map);                                                                                                        
var legend = L.control();
    legend.onAdd = function (map) {
        div = L.DomUtil.create( 'div', 'info legend' );
        div.innerHTML = '<h4><b>MAP</b></h4>' +  ('Planting Sites<br>Search by Planting Site Number');
        return div;
    };
    legend.addTo(map);

const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

var popup = L.popup()
    .setLatLng([13.108166, 77.538301])
    .setContent("Welcome To <b>DSKL</b>")
    .openOn(map);

L.control.locate({
    strings: {
        title: "Show me where I am"
    }
}).addTo(map);

function popUp(f,l){
    var out = [];
    if (f.properties){
        for(key in f.properties){
            out.push("<b>"+ key +"</b> : "+f.properties[key]);
        }
        l.bindPopup(out.join("<br />"));
    }
}
var featuresLayer1 = new L.GeoJSON(dsklsec, {
            style: function(feature) {
                return {opacity: 1,
                color: 'rgba(0,0,255,1.0)',
                weight: 3,
                fillColor: '#0000FF',
                fillOpacity: 0,
                interactive: true,};
            },
            onEachFeature:popUp}
        );
    map.addLayer(featuresLayer1);
map.fitBounds(featuresLayer1.getBounds());

var featuresLayer2 = new L.GeoJSON(point, {onEachFeature:popUp});map.addLayer(featuresLayer2);

const baseLayers = {
  'Open Street Map': tiles
};
const overlays = {
  'Sectors': featuresLayer1, 'Point': featuresLayer2
};
const layerControl = L.control.layers(baseLayers, overlays).addTo(map);
const searchControl = new L.Control.Search({
    layer: featuresLayer2,             
    propertyName: 'Planting Site Number',          
    zoom: 18,                         
    marker: false,                    
    moveToLocation: function(latlng, title, map) {
        map.flyTo(latlng, 18); 
    }
}).on('search:locationfound', function(e) {
    e.layer.openPopup();
  }).addTo(map);
</script>
</body>
</html>
